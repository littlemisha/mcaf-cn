name: 获取并翻译愚人节语言文件

on:
  workflow_dispatch:
    inputs:
      version:
        description: '愚人节版本 ID'
        required: true
        type: string

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 安装依赖工具
        run: |
          sudo apt-get update
          sudo apt-get install -y opencc

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装 Python 依赖
        run: pip install requests

      - name: 更新翻译（包含检测、下载、翻译、生成繁体）
        env:
          MODELSCOPE_API_KEY: ${{ secrets.MODELSCOPE_API_KEY }}
          VERSION: ${{ github.event.inputs.version }}
        run: python scripts/update.py

      - name: 提交并推送更改
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          if [ -f "en_us.json" ]; then git add en_us.json; fi
          if [ -f "assets/minecraft/lang/zh_cn.json" ]; then git add assets/minecraft/lang/zh_cn.json; fi
          if [ -f "assets/minecraft/lang/zh_tw.json" ]; then git add assets/minecraft/lang/zh_tw.json; fi
          if [ -f "assets/minecraft/lang/zh_hk.json" ]; then git add assets/minecraft/lang/zh_hk.json; fi
          if git diff --cached --quiet; then
            echo "没有文件变更，跳过提交"
          else
            git commit -m "feat: 更新愚人节版本翻译"
            git push https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
          fi

      - name: 触发 Release 工作流
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/release.yml/dispatches \
            -d '{"ref":"${{ github.event.repository.default_branch }}"}'